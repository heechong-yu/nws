<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TN Weather Alerts</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f8f9fa; }
        .alert-box { background: white; border-left: 10px solid #dc3545; padding: 20px; margin-bottom: 15px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .no-alerts { color: #6c757d; text-align: center; margin-top: 50px; }
        .error-log { background: #fff5f5; color: #b71c1c; padding: 15px; border: 1px solid #ffcdd2; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>

    <h1>Active Tennessee Weather Alerts</h1>
    <div id="display">Fetching live data...</div>

    <script>
        async function getTNWeather() {
            const display = document.getElementById('display');
            
            try {
                // IMPORTANT: The NWS API requires a UNIQUE User-Agent.
                // If many people use the same one, they block it.
                // Replace 'User12345' with your name or a random string.
                const uniqueID = 'MyApp_TN_Alerts_User_' + Math.floor(Math.random() * 10000);
                
                const response = await fetch('https://api.weather.gov', {
                    headers: {
                        'User-Agent': `${uniqueID} (contact: dev@example.com)`,
                        'Accept': 'application/geo+json'
                    }
                });

                // If the server sends HTML instead of JSON, this check will catch it
                const contentType = response.headers.get("content-type");
                if (!response.ok || !contentType || !contentType.includes("json")) {
                    const htmlError = await response.text();
                    console.error("NWS returned HTML error instead of JSON:", htmlError);
                    throw new Error(`Server returned ${response.status}. The NWS sent an HTML error page instead of data.`);
                }

                const data = await response.json();
                
                if (!data.features || data.features.length === 0) {
                    display.innerHTML = '<div class="no-alerts"><h3>No active weather alerts for Tennessee.</h3></div>';
                    return;
                }

                display.innerHTML = '';
                data.features.forEach(item => {
                    const p = item.properties;
                    display.innerHTML += `
                        <div class="alert-box">
                            <h2 style="margin-top:0">${p.event}</h2>
                            <p><strong>Headline:</strong> ${p.headline}</p>
                            <p><strong>Urgency:</strong> ${p.urgency} | <strong>Severity:</strong> ${p.severity}</p>
                            <small>Expires: ${new Date(p.expires).toLocaleString()}</small>
                        </div>
                    `;
                });

            } catch (err) {
                display.innerHTML = `
                    <div class="error-log">
                        <strong>Error Detected:</strong> ${err.message}<br><br>
                        <em>Tip: Press F12 and click 'Console' to see the full server response.</em>
                    </div>
                `;
            }
        }

        getTNWeather();
    </script>
</body>
</html>
