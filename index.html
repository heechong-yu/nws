<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TN Weather Alerts</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f8f9fa; }
        .alert-box { background: white; border-left: 10px solid #dc3545; padding: 20px; margin-bottom: 15px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .no-alerts { color: #6c757d; text-align: center; margin-top: 50px; }
        .error-log { background: #fff5f5; color: #b71c1c; padding: 15px; border: 1px solid #ffcdd2; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>

    <h1>Active Tennessee Weather Alerts</h1>
    <div id="display">Fetching live data...</div>

    <script>
async function getTNWeather() {
    const display = document.getElementById('display');
    const url = `https://api.weather.gov{Date.now()}`;

    try {
        const response = await fetch(url, {
            headers: {
                // Must be unique! Change 'MyUniqueApp' to something else.
                'User-Agent': 'MyUniqueApp_TN_Alerts_v4 (contact: dev@example.com)',
                'Accept': 'application/geo+json'
            }
        });

        // FIX: Verify if the response is actually the JSON we asked for
        const contentType = response.headers.get("content-type");
        if (!response.ok || !contentType || !contentType.includes("json")) {
            console.error("NWS returned non-JSON content:", contentType);
            throw new Error("The NWS server is currently sending a web page instead of data. Please try again in 5 minutes.");
        }

        const data = await response.json();
        
        if (!data.features || data.features.length === 0) {
            display.innerHTML = '<div class="no-alerts">No active weather alerts for Tennessee.</div>';
            return;
        }

        display.innerHTML = data.features.map(f => `
            <div class="alert-box">
                <h2>${f.properties.event}</h2>
                <p>${f.properties.headline || "Check local news for details."}</p>
            </div>
        `).join('');

    } catch (err) {
        display.innerHTML = `<div class="error">${err.message}</div>`;
    }
}

    </script>
</body>
</html>
