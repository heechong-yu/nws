<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TN Weather Alerts</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f8f9fa; }
        .alert-box { background: white; border-left: 10px solid #dc3545; padding: 20px; margin-bottom: 15px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .no-alerts { color: #6c757d; text-align: center; margin-top: 50px; }
        .error-log { background: #fff5f5; color: #b71c1c; padding: 15px; border: 1px solid #ffcdd2; border-radius: 4px; font-family: monospace; }
    </style>
</head>
<body>

    <h1>Active Tennessee Weather Alerts</h1>
    <div id="display">Fetching live data...</div>

    <script>
async function getTNWeather() {
    const display = document.getElementById('display');
    
    try {
        // 1. CREATE A DYNAMIC CACHE BUSTER
        // This prevents the server from sending you a "stale" HTML error page.
        const cacheBuster = new Date().getTime();
        const url = `https://api.weather.gov{cacheBuster}`;

        // 2. USE AN EXTREMELY SPECIFIC USER-AGENT
        // NWS will block generic scripts. Make yours unique.
        const response = await fetch(url, {
            headers: {
                'User-Agent': 'TN_Weather_Monitor_v3_Dev_Contact_12345',
                'Accept': 'application/geo+json' // Explicitly ask for JSON
            }
        });

        // 3. VERIFY CONTENT TYPE BEFORE PARSING
        const contentType = response.headers.get("content-type");
        if (!contentType || !contentType.includes("json")) {
            throw new Error("NWS sent a web page instead of weather data. This usually happens during API maintenance.");
        }

        const data = await response.json();
        
        if (!data.features || data.features.length === 0) {
            display.innerHTML = '<div class="no-alerts"><h3>No active weather alerts for Tennessee.</h3></div>';
            return;
        }

        display.innerHTML = '';
        data.features.forEach(item => {
            const p = item.properties;
            display.innerHTML += `
                <div class="alert-box">
                    <h2 style="margin-top:0">${p.event}</h2>
                    <p><strong>Headline:</strong> ${p.headline || 'No headline available'}</p>
                    <p><strong>Severity:</strong> ${p.severity} | <strong>Certainty:</strong> ${p.certainty}</p>
                    <small>Expires: ${new Date(p.expires).toLocaleString()}</small>
                </div>
            `;
        });

    } catch (err) {
        display.innerHTML = `
            <div style="background:#fff5f5; color:#b71c1c; padding:15px; border:1px solid #ffcdd2; border-radius:4px;">
                <strong>Connection Issue:</strong> ${err.message}<br><br>
                <em>The NWS API is notoriously unstable. If this persists, wait 10 minutes and try again.</em>
            </div>
        `;
    }
}

getTNWeather();
    </script>
</body>
</html>
